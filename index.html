<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4th!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060f; }
  #sky { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

  #ytwrap { position: fixed; left: 0; bottom: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -1; overflow: hidden; }

  #collapseBtn {
    position: absolute; top: 50%; right: -11px; transform: translateY(-50%);
    width: 22px; height: 46px; border-radius: 7px; cursor: pointer; z-index: 3;
    background: rgba(26,28,48,0.96); border: 1px solid rgba(255,255,255,0.16); color: #cfd2e6;
    font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  #collapseBtn:hover { background: rgba(40,43,68,0.98); }

  #attribution {
    position: fixed; right: 12px; bottom: 10px; z-index: 10;
    color: rgba(255,255,255,0.5); font-size: 11px; text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: rgba(5,6,15,0.45); padding: 4px 9px; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #attribution:hover { color: rgba(255,255,255,0.9); background: rgba(5,6,15,0.7); }

  #building {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: min(1100px, 90vw); height: auto; max-height: 62vh;
    object-fit: contain; object-position: bottom;
    z-index: 4; pointer-events: none; user-select: none;
  }

  #panel {
    position: fixed; top: 16px; left: 16px; z-index: 10; width: 240px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #panel.hidden { transform: translateX(-125%); opacity: 0; }

  #panelScroll {
    background: rgba(12, 14, 28, 0.72);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 16px 18px;
    color: #e8eaf6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    user-select: none;
  }
  #panelScroll::-webkit-scrollbar { width: 8px; }
  #panelScroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }

  #panel h1 {
    font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
    margin-bottom: 4px; display: flex; align-items: center; gap: 7px;
  }
  #panel .sub { font-size: 11px; opacity: 0.55; margin-bottom: 14px; line-height: 1.5; }

  .row { margin-bottom: 13px; }
  .row > .cap { font-size: 11px; opacity: 0.6; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
  .row label {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; font-size: 12px; opacity: 0.85;
  }
  .row label .val { font-variant-numeric: tabular-nums; opacity: 0.6; font-size: 11px; }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    background: rgba(255,255,255,0.14); border-radius: 3px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 15px; height: 15px;
    border-radius: 50%; background: #ffd166; cursor: pointer;
    box-shadow: 0 0 8px rgba(255,209,102,0.7);
  }
  input[type=range]::-moz-range-thumb {
    width: 15px; height: 15px; border: none; border-radius: 50%;
    background: #ffd166; cursor: pointer; box-shadow: 0 0 8px rgba(255,209,102,0.7);
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #e8eaf6; border-radius: 9px; padding: 7px 10px; font-size: 12px;
    cursor: pointer; transition: background 0.15s; width: 100%;
  }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn.active { background: rgba(255,209,102,0.18); border-color: rgba(255,209,102,0.4); color: #ffd166; }
  .btn + .btn { margin-top: 8px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    flex: 1 1 auto; text-align: center; min-width: 62px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #cfd2e6; border-radius: 8px; padding: 6px 4px; font-size: 12px; cursor: pointer;
    transition: background 0.12s;
  }
  .chip:hover { background: rgba(255,255,255,0.13); }
  .chip.sel { background: rgba(255,209,102,0.2); border-color: rgba(255,209,102,0.45); color: #ffd166; }

  .check { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; opacity: 0.9; }
  .check input { width: 15px; height: 15px; accent-color: #ffd166; cursor: pointer; }

  #intro {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(5,6,15,0.82); backdrop-filter: blur(6px);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  #intro.hidden { display: none; }
  .intro-card {
    background: rgba(16,18,34,0.96); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 28px 30px; max-width: 380px; width: calc(100% - 40px); text-align: center; color: #e8eaf6;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .intro-emoji { font-size: 44px; margin-bottom: 4px; }
  .intro-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
  .intro-card p { font-size: 13px; line-height: 1.6; opacity: 0.75; margin-bottom: 18px; }
  .intro-card .check { justify-content: center; margin-bottom: 20px; font-size: 13px; opacity: 1; }
  .intro-card .btn { font-size: 14px; padding: 11px; }

  .swatches { display: flex; gap: 7px; flex-wrap: wrap; }
  .swatch {
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.sel { border-color: #fff; }

  #hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 12px; z-index: 10; pointer-events: none;
    font-family: -apple-system, system-ui, sans-serif; text-align: center;
    transition: opacity 0.6s;
  }
  #toggleBtn {
    position: fixed; top: 16px; left: 16px; z-index: 11;
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(12,14,28,0.72); border: 1px solid rgba(255,255,255,0.08);
    color: #ffd166; font-size: 18px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
</style>
</head>

<script>
(() => {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  // Offscreen ping-pong buffers hold the accumulated smoke, so the whole
  // trail layer can be nudged sideways each frame and actually drift with the wind.
  const bufA = document.createElement('canvas'), bufB = document.createElement('canvas');
  let read = { c: bufA, x: bufA.getContext('2d') };
  let write = { c: bufB, x: bufB.getContext('2d') };
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    for (const cv of [canvas, bufA, bufB]) { cv.width = W * DPR; cv.height = H * DPR; }
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const rand = (a, b) => a + Math.random() * (b - a);

  // ---- Config (bound to UI) ----
  const cfg = {
    rate: 0.3, size: 100, gravity: 0.035, fade: 0.15, wind: 0.35, salvo: true,
    auto: true, crackle: true, colorMode: 'rainbow', shape: 'random', safeFlash: false,
  };
  let started = false;   // held until the intro modal is dismissed

  const SHAPES = ['burst', 'ring', 'willow', 'palm', 'heart', 'flash'];

  const PALETTE = [
    { name: 'rainbow', color: 'rainbow' },
    { name: 'gold',    color: '#ffcf4d' },
    { name: 'red',     color: '#ff4d6d' },
    { name: 'blue',    color: '#4da6ff' },
    { name: 'green',   color: '#4dffb0' },
    { name: 'violet',  color: '#c77dff' },
    { name: 'white',   color: '#ffffff' },
  ];

  // ================= AUDIO ENGINE =================
  const Audio = (() => {
    let ctxA = null, master = null, noiseBuf = null, reverbSend = null, slapSend = null;
    let enabled = true, volume = 1;

    function ensure() {
      if (ctxA) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { enabled = false; return; }
      ctxA = new AC();
      master = ctxA.createGain();
      master.gain.value = volume;
      master.connect(ctxA.destination);
      const len = Math.floor(ctxA.sampleRate * 1.5);
      noiseBuf = ctxA.createBuffer(1, len, ctxA.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      // Sense of space, two sends the big sounds feed into:
      //  • a gentle convolver reverb for a touch of air, and
      //  • a slap-back delay — a single distinct reflection bouncing off distant terrain.
      const conv = ctxA.createConvolver();
      const rlen = Math.floor(ctxA.sampleRate * 1.5), ir = ctxA.createBuffer(2, rlen, ctxA.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const c = ir.getChannelData(ch);
        for (let i = 0; i < rlen; i++) c[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rlen, 3.4);
      }
      conv.buffer = ir;
      reverbSend = ctxA.createGain(); reverbSend.gain.value = 0.22;   // subtle now, not washy
      reverbSend.connect(conv); conv.connect(master);

      const dl = ctxA.createDelay(0.6); dl.delayTime.value = 0.23;    // ~230 ms reflection
      const dlp = ctxA.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 1300; // distant = dull
      const fb = ctxA.createGain(); fb.gain.value = 0.12;             // barely any second bounce
      dl.connect(dlp); dlp.connect(master); dlp.connect(fb); fb.connect(dl);
      slapSend = ctxA.createGain(); slapSend.gain.value = 0.16;       // faint, distant reflection
      slapSend.connect(dl);
    }
    function resume() { if (ctxA && ctxA.state === 'suspended') ctxA.resume(); }
    function noise() { const s = ctxA.createBufferSource(); s.buffer = noiseBuf; s.loop = true; return s; }
    function pan(x) { const p = ctxA.createStereoPanner(); p.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); return p; }

    function boom(x, size, dist) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const d = dist || 0;
      const t = ctxA.currentTime + d * 0.22, p = pan(x);   // distant sound arrives a beat later
      p.connect(master); p.connect(reverbSend); p.connect(slapSend);
      if (d > 0.01) { const ex = ctxA.createGain(); ex.gain.value = d * 0.8; p.connect(ex); ex.connect(reverbSend); }
      const vol = Math.min(1, (0.42 + size / 280) * (1 - 0.5 * d)), hi = 1 - 0.5 * d, rv = () => 0.9 + Math.random() * 0.2;
      // Real aerial shell: a sharp CRACK (report) -> deep BOOM (concussion) -> rolling
      // RUMBLE. The crack has bright content but is VERY brief, so it snaps like a
      // report instead of hissing like a struck match. All sustained energy stays low.

      // 1a. report click — ~12 ms bright snap (the leading edge of the crack)
      const clk = noise();
      const chp = ctxA.createBiquadFilter(); chp.type = 'highpass'; chp.frequency.value = 1500;
      const clkG = ctxA.createGain();
      clkG.gain.setValueAtTime(vol * 0.85 * (1 - 0.7 * d), t);   // far shells lose the sharp click
      clkG.gain.exponentialRampToValueAtTime(0.0001, t + 0.012);
      clk.connect(chp); chp.connect(clkG); clkG.connect(p); clk.start(t); clk.stop(t + 0.02);
      // 1b. crack body — ~50 ms mid snap
      const crk = noise();
      const cbp = ctxA.createBiquadFilter(); cbp.type = 'bandpass'; cbp.frequency.value = 850 * rv() * hi; cbp.Q.value = 0.9;
      const crkG = ctxA.createGain();
      crkG.gain.setValueAtTime(vol * 0.7, t);
      crkG.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
      crk.connect(cbp); cbp.connect(crkG); crkG.connect(p); crk.start(t); crk.stop(t + 0.06);

      // 2. boom — the concussion: heavy low-passed noise, instant hit
      const body = noise();
      const blp = ctxA.createBiquadFilter(); blp.type = 'lowpass'; blp.Q = 0.7;
      blp.frequency.setValueAtTime(420 * rv(), t);
      blp.frequency.exponentialRampToValueAtTime(60, t + 0.13);
      const bg = ctxA.createGain();
      bg.gain.setValueAtTime(vol, t);
      bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
      body.connect(blp); blp.connect(bg); bg.connect(p); body.start(t); body.stop(t + 0.45);

      // 3. sub weight — low sine under the noise (short support, not a lead tone)
      const o = ctxA.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(72 * rv(), t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.22);
      const og = ctxA.createGain();
      og.gain.setValueAtTime(vol * 0.6, t);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      o.connect(og); og.connect(p); o.start(t); o.stop(t + 0.32);

      // 4. rumble tail — long, low, rolling like thunder
      const rum = noise();
      const rlp = ctxA.createBiquadFilter(); rlp.type = 'lowpass'; rlp.frequency.value = 130;
      const rg = ctxA.createGain();
      rg.gain.setValueAtTime(0.0001, t + 0.03);
      rg.gain.exponentialRampToValueAtTime(vol * 0.5, t + 0.13);
      rg.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
      rum.connect(rlp); rlp.connect(rg); rg.connect(p);
      rum.start(t); rum.stop(t + 1.05);
    }

    // Soft report for a multi-break sub-shell — smaller/higher than a full boom.
    function pop(x, dist) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const d = dist || 0, t = ctxA.currentTime + d * 0.18, p = pan(x);
      p.connect(master); p.connect(reverbSend);
      const vol = 0.32 * (1 - 0.5 * d);
      const crk = noise();
      const bp = ctxA.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 750 * (0.9 + Math.random() * 0.2); bp.Q.value = 1;
      const g = ctxA.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
      crk.connect(bp); bp.connect(g); g.connect(p); crk.start(t); crk.stop(t + 0.08);
      const src = noise();
      const lp = ctxA.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(300, t); lp.frequency.exponentialRampToValueAtTime(90, t + 0.08);
      const g2 = ctxA.createGain();
      g2.gain.setValueAtTime(vol * 0.9, t);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      src.connect(lp); lp.connect(g2); g2.connect(p); src.start(t); src.stop(t + 0.18);
    }

    function launch(x) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const t = ctxA.currentTime, p = pan(x); p.connect(master);

      // mortar thud — hollow low "thoomp" as the shell leaves the tube
      const o = ctxA.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(105, t);
      o.frequency.exponentialRampToValueAtTime(21, t + 0.17);
      const og = ctxA.createGain();
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.82, t + 0.007);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
      o.connect(og); og.connect(p); o.start(t); o.stop(t + 0.32);

      // tube pop — short low-passed noise transient for the "chuff"
      const pop = noise();
      const plp = ctxA.createBiquadFilter(); plp.type = 'lowpass'; plp.frequency.value = 500;
      const pg = ctxA.createGain();
      pg.gain.setValueAtTime(0.4, t);
      pg.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
      pop.connect(plp); plp.connect(pg); pg.connect(p);
      pop.start(t); pop.stop(t + 0.1);

      // faint rising whoosh tail — shell climbing away
      const src = noise();
      const bp = ctxA.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
      bp.frequency.setValueAtTime(500, t + 0.02);
      bp.frequency.exponentialRampToValueAtTime(1700, t + 0.34);
      const g = ctxA.createGain();
      g.gain.setValueAtTime(0.0001, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.03, t + 0.06);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.36);
      src.connect(bp); bp.connect(g); g.connect(p);
      src.start(t + 0.02); src.stop(t + 0.38);
    }

    // Bottle-rocket whistle — a shrill, warbling tone that glides down over the
    // ascent (reedy sawtooth through a tracking high-Q bandpass, plus vibrato).
    function whistle(x) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const t = ctxA.currentTime, p = pan(x); p.connect(master);
      const dur = 0.9 + Math.random() * 0.7;
      const f0 = 1700 + Math.random() * 700, f1 = f0 * (0.55 + Math.random() * 0.18);
      const o = ctxA.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(f0, t);
      o.frequency.exponentialRampToValueAtTime(f1, t + dur);
      const vib = ctxA.createOscillator(); vib.type = 'sine'; vib.frequency.value = 6 + Math.random() * 5;
      const vibg = ctxA.createGain(); vibg.gain.value = f0 * 0.03;
      vib.connect(vibg); vibg.connect(o.frequency); vib.start(t);
      const bp = ctxA.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 9;
      bp.frequency.setValueAtTime(f0, t);
      bp.frequency.exponentialRampToValueAtTime(f1, t + dur);
      const g = ctxA.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.08, t + 0.05);
      g.gain.setValueAtTime(0.08, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(bp); bp.connect(g); g.connect(p);
      o.start(t); o.stop(t + dur + 0.05); vib.stop(t + dur + 0.05);
    }

    function crackle(x) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const t0 = ctxA.currentTime, p = pan(x); p.connect(master); p.connect(reverbSend);
      const n = 36;
      for (let i = 0; i < n; i++) {
        const t = t0 + 0.03 + Math.random() * 0.9;
        const bright = Math.random() < 0.7;                  // mix of crisp snaps and lower pops
        const src = noise();
        const hp = ctxA.createBiquadFilter(); hp.type = 'highpass';
        hp.frequency.value = bright ? 3200 + Math.random() * 3200 : 1400 + Math.random() * 1000;
        const g = ctxA.createGain();
        const v = (bright ? 0.04 : 0.06) * (0.6 + Math.random() * 0.7);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(v, t + 0.003);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.028 + Math.random() * 0.03);
        src.connect(hp); hp.connect(g); g.connect(p);
        src.start(t); src.stop(t + 0.08);
      }
    }

    function flashbang(x) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const t = ctxA.currentTime, p = pan(x); p.connect(master); p.connect(reverbSend); p.connect(slapSend);
      // sharp transient click — the initial crack
      const clk = noise();
      const chp = ctxA.createBiquadFilter(); chp.type = 'highpass'; chp.frequency.value = 1200;
      const cg = ctxA.createGain();
      cg.gain.setValueAtTime(0.95, t);
      cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
      clk.connect(chp); chp.connect(cg); cg.connect(p); clk.start(t); clk.stop(t + 0.05);
      // body: louder, shorter, brighter than a boom
      const src = noise();
      const lp = ctxA.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(2800, t);
      lp.frequency.exponentialRampToValueAtTime(140, t + 0.18);
      const g = ctxA.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.95, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      src.connect(lp); lp.connect(g); g.connect(p);
      src.start(t); src.stop(t + 0.25);
      // sub thump for the chest-punch
      const o = ctxA.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(130, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.18);
      const og = ctxA.createGain();
      og.gain.setValueAtTime(0.9, t);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      o.connect(og); og.connect(p); o.start(t); o.stop(t + 0.25);
      // short rumble tail so the salute cracks then rolls away
      const rum = noise();
      const rlp = ctxA.createBiquadFilter(); rlp.type = 'lowpass'; rlp.frequency.value = 260;
      const rg = ctxA.createGain();
      rg.gain.setValueAtTime(0.0001, t + 0.02);
      rg.gain.exponentialRampToValueAtTime(0.5, t + 0.1);
      rg.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
      rum.connect(rlp); rlp.connect(rg); rg.connect(p);
      rum.start(t); rum.stop(t + 0.85);
    }

    // Drone-swarm sound. A single small drone is a HIGH, whiny buzz — a bright
    // sawtooth in the hundreds-of-Hz range with a fast warble, not a low rumble.
    // A swarm is many of those detuned together, so the voice count and overall
    // loudness scale with how many drones are in the air.
    function drones(aMs, hMs, fMs, count) {
      if (!enabled) return; ensure(); if (!ctxA) return; resume();
      const t = ctxA.currentTime;
      const bus = ctxA.createGain(); bus.gain.value = 0.0001;
      const tone = ctxA.createBiquadFilter(); tone.type = 'lowpass'; tone.frequency.value = 5600;
      bus.connect(tone); tone.connect(master);
      const nodes = [];

      // More drones -> more overlapping whines (denser, beating shimmer).
      const voices = Math.max(4, Math.min(18, Math.round(count / 40)));
      for (let i = 0; i < voices; i++) {
        const base = 430 + Math.random() * 560;            // 430–990 Hz small-drone whine
        const o = ctxA.createOscillator(); o.type = 'sawtooth'; o.frequency.value = base;
        // warble: motor wobble + swarm detune
        const vib = ctxA.createOscillator(); vib.type = 'sine'; vib.frequency.value = 3 + Math.random() * 6;
        const vibg = ctxA.createGain(); vibg.gain.value = base * 0.03;
        vib.connect(vibg); vibg.connect(o.frequency); vib.start(t);
        // emphasise a high whistling harmonic
        const bp = ctxA.createBiquadFilter(); bp.type = 'bandpass';
        bp.frequency.value = base * 2.4; bp.Q.value = 4 + Math.random() * 5;
        const og = ctxA.createGain(); og.gain.value = 0.5 / voices;
        o.connect(bp); bp.connect(og); og.connect(bus); o.start(t);
        nodes.push(o, vib);
      }
      // Broadband prop hiss, thicker with more drones.
      const nz = noise();
      const nbp = ctxA.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = 3100; nbp.Q.value = 0.5;
      const ng = ctxA.createGain(); ng.gain.value = 0.05 * Math.min(count / 300, 1.6);
      nz.connect(nbp); nbp.connect(ng); ng.connect(bus); nz.start(t); nodes.push(nz);
      // Subtle fast flutter (blade beat).
      const fl = ctxA.createOscillator(); fl.type = 'sine'; fl.frequency.value = 28;
      const flg = ctxA.createGain(); flg.gain.value = 0;
      fl.connect(flg); flg.connect(bus.gain); fl.start(t); nodes.push(fl);

      const A = aMs / 1000, Hh = hMs / 1000, F = fMs / 1000;
      const level = 0.08 + 0.06 * Math.min(count / 400, 1.6);   // louder with more drones
      bus.gain.setValueAtTime(0.0001, t);
      bus.gain.exponentialRampToValueAtTime(level, t + A * 0.85);
      bus.gain.setValueAtTime(level, t + A + Hh);
      bus.gain.exponentialRampToValueAtTime(0.0001, t + A + Hh + F);
      flg.gain.setValueAtTime(0, t);
      flg.gain.linearRampToValueAtTime(level * 0.35, t + A);

      const stop = t + A + Hh + F + 0.1;
      nodes.forEach(n => { try { n.stop(stop); } catch (e) {} });
    }

    return {
      boom, pop, launch, whistle, crackle, flashbang, drones, resume, ensure,
      set enabled(v) { enabled = v; if (v) { ensure(); resume(); } },
      get enabled() { return enabled; },
      setVolume(v) { volume = v; if (master) master.gain.value = v; },
    };
  })();

  // ================= MUSIC (looped YouTube track) =================
  let ytPlayer = null, ytReady = false, musicVol = 20;
  let musicWant = false, autoStarted = false;
  let updateMusicBtn = () => {};   // set by the UI to reflect play/pause state
  (function () {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();
  window.onYouTubeIframeAPIReady = () => {
    ytPlayer = new YT.Player('ytplayer', {
      videoId: 'h8RnD9Qz1tI',
      playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'h8RnD9Qz1tI', modestbranding: 1, disablekb: 1, playsinline: 1 },
      events: {
        onReady: (e) => { ytReady = true; e.target.setVolume(musicVol); if (musicWant) e.target.playVideo(); },
        onStateChange: (e) => { if (e.data === 0) { e.target.seekTo(0); e.target.playVideo(); } },   // 0 = ENDED -> re-loop
      },
    });
  };
  function playMusic() { musicWant = true; if (ytReady && ytPlayer) { ytPlayer.setVolume(musicVol); ytPlayer.playVideo(); } updateMusicBtn(); }
  function pauseMusic() { musicWant = false; if (ytReady && ytPlayer) ytPlayer.pauseVideo(); updateMusicBtn(); }
  function toggleMusic() { musicWant ? pauseMusic() : playMusic(); }
  function autoStartMusic() { if (autoStarted) return; autoStarted = true; playMusic(); }
  function setMusicVol(v) { musicVol = v; if (ytReady && ytPlayer) ytPlayer.setVolume(v); }

  // ================= PARTICLES =================
  const rockets = [], sparks = [], twinkles = [], shockwaves = [];
  let screenFlash = 0;
  let droneShow = null, LOGO = null, BEAR = null, FLAG = null;
  let finale = null;
  const buildingEl = document.getElementById('building');
  const delayedBursts = [];   // secondary "multi-break" pops scheduled after a burst

  // Rockets launch from behind the rooftop of the building (campus launch); fall
  // back to the screen bottom if the image isn't present.
  function launchOrigin() {
    const b = buildingEl;
    if (b && b.style.display !== 'none' && b.complete && b.naturalWidth > 0) {
      const r = b.getBoundingClientRect();
      if (r.width > 0 && r.height > 0)
        return { x: r.left + r.width * (0.12 + Math.random() * 0.76),
                 y: r.top + r.height * (0.36 + Math.random() * 0.1) };
    }
    return { x: rand(W * 0.2, W * 0.8), y: H };
  }

  // A secondary sub-break: a small spherical pop of sparks + a soft report.
  function triggerMini(b) {
    const n = Math.max(8, Math.floor(b.size));
    const speed = 1.4 + Math.random() * 1.3;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = speed * Math.sqrt(Math.random());
      const col = b.fixed || `hsl(${(b.hue + rand(-18, 18) + 360) % 360},100%,${rand(58, 72)}%)`;
      sparks.push(new Spark(b.x, b.y, Math.cos(a) * s, Math.sin(a) * s, col,
        { decay: rand(0.02, 0.045), dim: b.dim }));
    }
    Audio.pop(b.x, b.dist || 0);
  }

  class Rocket {
    constructor(tx, ty) {
      const o = launchOrigin();
      this.x = tx != null ? tx : o.x;
      this.y = o.y;
      // depth: ~35% of shells are "far" — higher, smaller, quieter, duller, sound delayed
      this.dist = Math.random() < 0.35 ? 0.45 + Math.random() * 0.55 : Math.random() * 0.3;
      const apex = rand(H * 0.12, H * 0.42) - this.dist * H * 0.1;   // far shells burst higher
      this.targetY = ty != null ? ty : Math.max(H * 0.05, apex);
      if (this.targetY > this.y - 80) this.targetY = this.y - rand(90, 220);
      const travel = this.y - this.targetY;
      this.vy = -Math.sqrt(2 * cfg.gravity * travel) * rand(0.98, 1.04);
      this.vx = rand(-0.4, 0.4);
      this.color = cfg.colorMode === 'rainbow'
        ? `hsl(${Math.floor(rand(0, 360))},100%,62%)` : cfg.colorMode;
      this.trail = [];
      this.dead = false;
      Audio.launch(this.x);
      if (Math.random() < 0.15) Audio.whistle(this.x);   // ~15% whistle on the way up
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 6) this.trail.shift();
      this.vy += cfg.gravity;
      this.x += this.vx; this.y += this.vy;
      if (this.vy >= 0 || this.y <= this.targetY) { this.explode(); this.dead = true; }
    }
    explode() {
      const shape = cfg.shape === 'random'
        ? SHAPES[Math.floor(rand(0, SHAPES.length))] : cfg.shape;
      if (shape === 'flash') { this.flashBang(); return; }
      const dist = this.dist || 0, distScale = 1 - 0.5 * dist, dim = 1 - 0.55 * dist;
      const count = Math.floor(cfg.size * distScale * rand(0.85, 1.15));
      const speed = rand(2.4, 4.3) * distScale;
      const baseHue = rand(0, 360);
      const col = (warm) => {
        if (cfg.colorMode !== 'rainbow') return cfg.colorMode;
        if (warm) return `hsl(${rand(34, 52)},100%,${rand(55, 66)}%)`;
        return `hsl(${(baseHue + rand(-22, 22) + 360) % 360},100%,${rand(55, 70)}%)`;
      };
      const crackleOn = cfg.crackle && Math.random() < 0.2;   // only ~20% of bursts crackle
      // ~30% of rainbow bursts shift to a second hue partway through the fall
      const shift = cfg.colorMode === 'rainbow' && Math.random() < 0.3;
      const shiftHue = (baseHue + 110 + rand(0, 130)) % 360;
      const shiftCol = () => `hsl(${(shiftHue + rand(-18, 18) + 360) % 360},100%,${rand(58, 72)}%)`;
      const mk = (vx, vy, c, opts = {}) => {
        opts.crackle = crackleOn && Math.random() < 0.5;
        opts.dim = dim;
        if (shift) { opts.color2 = shiftCol(); opts.shiftAt = 0.4 + Math.random() * 0.2; }
        sparks.push(new Spark(this.x, this.y, vx, vy, c, opts));
      };

      if (shape === 'ring') {
        for (let i = 0; i < count; i++) {
          const a = (i / count) * Math.PI * 2 + rand(-0.04, 0.04);
          const s = speed * rand(0.9, 1.03);
          mk(Math.cos(a) * s, Math.sin(a) * s, col(false), { decay: rand(0.01, 0.018) });
        }
      } else if (shape === 'willow') {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2);
          const s = speed * Math.sqrt(Math.random()) * rand(0.4, 0.8);
          mk(Math.cos(a) * s, Math.sin(a) * s, col(true),
            { decay: rand(0.004, 0.008), drag: 0.992, gravityMul: 1.0, width: 1.5 });
        }
      } else if (shape === 'palm') {
        const fronds = Math.floor(rand(7, 11));
        const per = Math.max(6, Math.floor(count / fronds));
        for (let f = 0; f < fronds; f++) {
          const base = -Math.PI / 2 + rand(-1.0, 1.0);
          for (let j = 0; j < per; j++) {
            const a = base + rand(-0.12, 0.12);
            const s = speed * rand(0.85, 1.15) * 1.1;
            mk(Math.cos(a) * s, Math.sin(a) * s, col(true),
              { decay: rand(0.006, 0.011), drag: 0.99, gravityMul: 0.9, width: 2.2 });
          }
        }
      } else if (shape === 'heart') {
        for (let i = 0; i < count; i++) {
          const t = (i / count) * Math.PI * 2;
          const hx = 16 * Math.pow(Math.sin(t), 3);
          const hy = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
          const sc = speed * 0.07 * rand(0.9, 1.1);   // ~matches burst extent (heart spans ~17 units)
          mk(hx * sc, -hy * sc, col(false), { decay: rand(0.008, 0.014) });
        }
      } else { // burst / chrysanthemum
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = speed * Math.sqrt(Math.random()) * rand(0.6, 1.1);
          mk(Math.cos(a) * s, Math.sin(a) * s, col(false));
        }
      }
      // ~18% of round shells are multi-break: they throw a few sub-shells that pop a beat later
      if ((shape === 'burst' || shape === 'ring') && Math.random() < 0.18) {
        const secs = 2 + Math.floor(Math.random() * 3), nowMs = performance.now(), spread = 40 + 60 * distScale;
        for (let s = 0; s < secs; s++) delayedBursts.push({
          t: nowMs + 260 + Math.random() * 320,
          x: this.x + rand(-spread, spread), y: this.y + rand(-spread, spread),
          size: cfg.size * 0.35 * distScale, hue: shift ? shiftHue : baseHue,
          fixed: cfg.colorMode !== 'rainbow' ? cfg.colorMode : null, dim, dist,
        });
      }
      Audio.boom(this.x, cfg.size, dist);
      if (crackleOn) Audio.crackle(this.x);
    }
    flashBang() {
      // salute / maroon: blinding white flash, shockwave, sharp crack — no color.
      // Reduced-flash mode keeps only a faint glow instead of a full-screen strobe.
      screenFlash = Math.min(1.1, screenFlash + (cfg.safeFlash ? 0.12 : 0.95));
      shockwaves.push(new Shockwave(this.x, this.y));
      const n = Math.floor(rand(22, 40));
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = rand(1.5, 6);
        sparks.push(new Spark(this.x, this.y, Math.cos(a) * s, Math.sin(a) * s,
          '#ffffff', { decay: rand(0.05, 0.1), drag: 0.88, gravityMul: 0.4, width: 2 }));
      }
      Audio.flashbang(this.x);
    }
    draw(g) {
      const p0 = this.trail[0] || this;
      g.beginPath();
      g.moveTo(p0.x, p0.y); g.lineTo(this.x, this.y);
      g.strokeStyle = 'rgba(255, 70, 18, 0.1)';   // very faint orange-red ember trail
      g.lineWidth = 1.5; g.stroke();
      // the ascending mortar — barely visible flickering amber ember
      g.globalAlpha = 0.14 + Math.random() * 0.16;
      g.beginPath(); g.arc(this.x, this.y, 1.3, 0, 6.29);
      g.fillStyle = '#ff7a1e'; g.fill();
      g.globalAlpha = 1;
    }
  }

  class Spark {
    constructor(x, y, vx, vy, color, opts = {}) {
      this.x = x; this.y = y; this.vx = vx; this.vy = vy;
      this.px = x; this.py = y; this.color = color;
      this.color2 = opts.color2 || null;    // shifts to this partway through the fall
      this.shiftAt = opts.shiftAt ?? 0.5;
      this.dim = opts.dim ?? 1;             // distance dimming
      this.life = 1;
      this.decay = opts.decay ?? rand(0.008, 0.02);
      this.drag = opts.drag ?? 0.985;
      this.gravityMul = opts.gravityMul ?? 0.55;
      this.width = opts.width ?? 1.8;
      this.flicker = Math.random() < 0.15;
      this.crackle = opts.crackle ?? false;
    }
    update() {
      this.px = this.x; this.py = this.y;
      this.vy += cfg.gravity * this.gravityMul;
      this.vx *= this.drag; this.vy *= this.drag;
      this.x += this.vx; this.y += this.vy;
      this.life -= this.decay;
      if (this.crackle && this.life < 0.7 && this.life > 0.12 &&
          Math.random() < 0.1 && twinkles.length < 1600) {
        twinkles.push(new Twinkle(this.x, this.y));
      }
    }
    draw(g) {
      let a = Math.max(this.life, 0) * this.dim;
      if (this.flicker) a *= 0.4 + Math.random() * 0.6;
      g.globalAlpha = a;
      g.beginPath();
      g.moveTo(this.px, this.py); g.lineTo(this.x, this.y);
      g.strokeStyle = (this.color2 && this.life < this.shiftAt) ? this.color2 : this.color;
      g.lineWidth = this.width * this.life + 0.4;
      g.stroke();
      g.globalAlpha = 1;
    }
  }

  class Twinkle {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = rand(-0.3, 0.3); this.vy = rand(-0.3, 0.3);
      this.life = 1; this.decay = rand(0.16, 0.3); this.size = rand(0.6, 1.7);
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.vy += cfg.gravity * 0.3;
      this.life -= this.decay;
    }
    draw(g) {
      g.globalAlpha = Math.max(this.life * (0.4 + Math.random() * 0.6), 0);
      g.beginPath(); g.arc(this.x, this.y, this.size, 0, 6.29);
      g.fillStyle = '#fff6d8'; g.fill();
      g.globalAlpha = 1;
    }
  }

  class Shockwave {
    constructor(x, y) { this.x = x; this.y = y; this.r = 4; this.vr = rand(9, 13); this.life = 1; }
    update() { this.r += this.vr; this.vr *= 0.93; this.life -= 0.05; }
    draw(g) {
      g.globalAlpha = Math.max(this.life, 0) * 0.7;
      g.beginPath(); g.arc(this.x, this.y, this.r, 0, 6.29);
      g.strokeStyle = '#ffffff'; g.lineWidth = 3 * this.life + 0.5; g.stroke();
      g.globalAlpha = 1;
    }
  }

  // ================= DRONE SHOW =================
  // Sample the shape of a "B" into ~400 points, each tagged by where it falls:
  // near an edge -> red, just inside that -> white, deep interior -> brown,
  // mirroring the logo's red outline / white keyline / brown body.
  function buildLogoPoints() {
    const CW = 440, CH = 520;
    const oc = document.createElement('canvas'); oc.width = CW; oc.height = CH;
    const o = oc.getContext('2d');
    o.fillStyle = '#fff'; o.textAlign = 'center'; o.textBaseline = 'middle';
    o.font = '900 500px "Arial Black", Arial, sans-serif';
    o.fillText('B', CW / 2, CH / 2 + 8);
    const data = o.getImageData(0, 0, CW, CH).data;
    const inside = (x, y) => x >= 0 && y >= 0 && x < CW && y < CH && data[((y | 0) * CW + (x | 0)) * 4 + 3] > 128;

    // Bounding box + boundary pixels (inside pixels touching an outside neighbour).
    let minX = CW, minY = CH, maxX = 0, maxY = 0;
    const boundary = [];
    for (let y = 0; y < CH; y++) for (let x = 0; x < CW; x++) {
      if (!inside(x, y)) continue;
      if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y;
      if (!inside(x - 1, y) || !inside(x + 1, y) || !inside(x, y - 1) || !inside(x, y + 1)) boundary.push(x, y);
    }
    const anyOutside = (x, y, d) => {
      for (let a = 0; a < 8; a++) { const g = a / 8 * Math.PI * 2; if (!inside(x + Math.cos(g) * d, y + Math.sin(g) * d)) return true; }
      return false;
    };

    const pts = [];
    // 1) Crisp red outline: sample densely along the boundary (incl. the counters).
    const OUTLINE = 360, bcount = boundary.length / 2;
    for (let i = 0; i < OUTLINE; i++) {
      const j = Math.floor(Math.random() * bcount) * 2;
      pts.push({ x: boundary[j] + (Math.random() - 0.5), y: boundary[j + 1] + (Math.random() - 0.5), color: 'red' });
    }
    // 2) Fill: a white keyline just inside the edge, brown body deeper in.
    const FILL = 420;
    let tries = 0, added = 0;
    while (added < FILL && tries < FILL * 60) {
      tries++;
      const x = minX + Math.random() * (maxX - minX);
      const y = minY + Math.random() * (maxY - minY);
      if (!inside(x, y) || anyOutside(x, y, 5)) continue;   // edge belongs to the outline pass
      pts.push({ x, y, color: anyOutside(x, y, 12) ? 'white' : 'brown' }); added++;
    }
    return { pts, minX, minY, maxX, maxY };
  }

  // Bear head, built from primitives: ears + head + muzzle silhouette (maroon),
  // angry teal eyes, an unlit nose gap, and a row of white teeth. Sampled the
  // same way as the letter — crisp red edge, colored interior.
  function buildBearPoints() {
    const CW = 460, CH = 430, cx = CW / 2;
    const oc = document.createElement('canvas'); oc.width = CW; oc.height = CH;
    const c = oc.getContext('2d');
    const tri = (a, b, d, e, f, h) => { c.beginPath(); c.moveTo(a, b); c.lineTo(d, e); c.lineTo(f, h); c.closePath(); c.fill(); };
    const ell = (x, y, rx, ry) => { c.beginPath(); c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2); c.fill(); };
    // --- silhouette: rounded bear head with ears, cheeks and muzzle ---
    c.fillStyle = '#7a1c1c';
    c.beginPath(); c.arc(116, 118, 54, 0, Math.PI * 2); c.fill();       // left ear (round)
    c.beginPath(); c.arc(CW - 116, 118, 54, 0, Math.PI * 2); c.fill();  // right ear
    ell(cx, 215, 172, 150);                                             // head dome
    ell(124, 288, 60, 74);                                             // left cheek
    ell(CW - 124, 288, 60, 74);                                        // right cheek
    ell(cx, 340, 106, 88);                                             // muzzle
    // --- features ---
    c.fillStyle = '#bcd6d6';                                           // scowling teal eyes
    const eye = (ex, s) => { c.save(); c.translate(ex, 205); c.rotate(s * 0.4); c.beginPath(); c.ellipse(0, 0, 30, 14, 0, 0, Math.PI * 2); c.fill(); c.restore(); };
    eye(cx - 76, 1); eye(cx + 76, -1);
    c.fillStyle = '#080808'; ell(cx, 300, 38, 25);                     // nose (unlit gap)
    c.fillStyle = '#ffffff';                                           // teeth
    for (let i = -2; i <= 2; i++) { const bx = cx + i * 23; tri(bx - 10, 372, bx + 10, 372, bx, 398); }

    const data = c.getImageData(0, 0, CW, CH).data;
    const px = (x, y) => { const i = ((y | 0) * CW + (x | 0)) * 4; return [data[i], data[i + 1], data[i + 2], data[i + 3]]; };
    const inside = (x, y) => x >= 0 && y >= 0 && x < CW && y < CH && px(x, y)[3] > 128;
    const classify = (r, g, b) =>
      r > 200 && g > 200 && b > 200 ? 'white'
      : b > 150 && g > 150 && r < g - 15 ? 'teal'
      : r < 40 && g < 40 && b < 40 ? 'black'
      : 'maroon';

    let minX = CW, minY = CH, maxX = 0, maxY = 0; const bnd = [];
    for (let y = 0; y < CH; y++) for (let x = 0; x < CW; x++) {
      if (!inside(x, y)) continue;
      if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y;
      if (!inside(x - 1, y) || !inside(x + 1, y) || !inside(x, y - 1) || !inside(x, y + 1)) bnd.push(x, y);
    }
    // Order the boundary into one loop (nearest-neighbour walk) so the outline
    // drones can be spaced evenly -> a crisp, continuous edge instead of speckle.
    const n = bnd.length / 2, used = new Uint8Array(n), ord = [];
    let cur = 0; used[0] = 1; ord.push(bnd[0], bnd[1]);
    for (let step = 1; step < n; step++) {
      const ox = bnd[cur * 2], oy = bnd[cur * 2 + 1];
      let best = -1, bd = Infinity;
      for (let i = 0; i < n; i++) {
        if (used[i]) continue;
        const dx = bnd[i * 2] - ox, dy = bnd[i * 2 + 1] - oy, d = dx * dx + dy * dy;
        if (d < bd) { bd = d; best = i; }
      }
      if (best < 0) break;
      used[best] = 1; cur = best; ord.push(bnd[best * 2], bnd[best * 2 + 1]);
    }

    const pts = [];
    const OUTLINE = 420, total = ord.length / 2;
    for (let i = 0; i < OUTLINE; i++) {
      const idx = Math.floor(i / OUTLINE * total) * 2;
      pts.push({ x: ord[idx], y: ord[idx + 1], color: 'red' });
    }
    // Dedicated feature sampling — eyes and teeth are too small for random fill.
    const feat = (want, count, x0, y0, x1, y1) => {
      let tr = 0, got = 0;
      while (got < count && tr < count * 300) {
        tr++;
        const x = x0 + Math.random() * (x1 - x0), y = y0 + Math.random() * (y1 - y0);
        if (!inside(x, y) || classify(...px(x, y)) !== want) continue;
        pts.push({ x, y, color: want }); got++;
      }
    };
    feat('teal', 30, cx - 112, 184, cx - 40, 226);      // left eye
    feat('teal', 30, cx + 40, 184, cx + 112, 226);      // right eye
    feat('white', 34, cx - 62, 368, cx + 62, 400);      // teeth
    // Maroon body fill (features handled above; unlit nose skipped).
    const FILL = 258; let tries = 0, added = 0;
    while (added < FILL && tries < FILL * 90) {
      tries++;
      const x = minX + Math.random() * (maxX - minX);
      const y = minY + Math.random() * (maxY - minY);
      if (!inside(x, y) || classify(...px(x, y)) !== 'maroon') continue;
      pts.push({ x, y, color: 'maroon' }); added++;
    }
    return { pts, minX, minY, maxX, maxY };
  }

  // American flag: a grid of red/white stripes, a blue canton, and a star field.
  // Each point carries u = horizontal fraction (0 at the hoist, 1 at the fly) so
  // the show can make it ripple more toward the free end.
  function buildFlagPoints() {
    const FW = 494, FH = 260, stripeH = FH / 13, cantonW = FW * 0.4, cantonH = stripeH * 7;
    const pts = [];
    const cols = 38, rows = 19;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const x = (c + 0.5) / cols * FW, y = (r + 0.5) / rows * FH;
      if (x < cantonW && y < cantonH) { pts.push({ x, y, color: 'blue', u: x / FW }); continue; }
      const stripe = Math.floor(y / stripeH);
      pts.push({ x, y, color: stripe % 2 === 0 ? 'red' : 'white', u: x / FW });
    }
    // 50 stars, classic 9 rows alternating 6 / 5.
    for (let r = 0; r < 9; r++) {
      const count = r % 2 === 0 ? 6 : 5;
      const y = cantonH * (r + 1) / 10;
      for (let s = 0; s < count; s++) {
        const x = cantonW * (s + 1) / (count + 1);
        pts.push({ x, y, color: 'white', u: x / FW });
      }
    }
    return { pts, minX: 0, minY: 0, maxX: FW, maxY: FH };
  }

  function mapTargets(logo) {
    const { pts, minX, minY, maxX, maxY } = logo;
    const gw = maxX - minX, gh = maxY - minY;
    const formH = Math.min(H * 0.5, W * 0.45 * (gh / gw));
    const scale = formH / gh;
    const cx = W * 0.5, cy = H * 0.36, mx = (minX + maxX) / 2, my = (minY + maxY) / 2;
    return pts.map(p => ({ tx: cx + (p.x - mx) * scale, ty: cy + (p.y - my) * scale, color: p.color, u: p.u }));
  }

  // Pre-rendered glow sprites (white-hot core + colored halo) for cheap twinkling.
  const GLOW = {};
  (function () {
    const mk = (halo) => {
      const c = document.createElement('canvas'); c.width = c.height = 32;
      const g = c.getContext('2d');
      const grd = g.createRadialGradient(16, 16, 0, 16, 16, 16);
      grd.addColorStop(0, 'rgba(255,255,255,0.98)');
      grd.addColorStop(0.22, halo);
      grd.addColorStop(0.7, 'rgba(0,0,0,0)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd; g.beginPath(); g.arc(16, 16, 16, 0, 6.29); g.fill();
      return c;
    };
    GLOW.red = mk('rgba(255,48,48,0.9)');
    GLOW.white = mk('rgba(255,240,240,0.9)');
    GLOW.brown = mk('rgba(206,126,60,0.95)');
    GLOW.maroon = mk('rgba(206,54,42,0.92)');
    GLOW.teal = mk('rgba(150,215,215,0.95)');
    GLOW.blue = mk('rgba(70,110,235,0.92)');
  })();

  class Drone {
    constructor() {
      this.sx = W * 0.5 + (Math.random() * 2 - 1) * W * 0.28;
      this.sy = H + 20 + Math.random() * 140;
      this.delay = Math.random() * 1.0;                 // staggered launch (s)
      this.tw = Math.random() * Math.PI * 2;
      this.twSpeed = 0.6 + Math.random() * 0.9;
      this.jx = Math.random() * Math.PI * 2; this.jy = Math.random() * Math.PI * 2;
      this.dvx = (Math.random() * 2 - 1) * 1.1;          // disperse drift
      this.dvy = -(0.4 + Math.random() * 1.0);
      this.seq = null;                                   // per-formation target, set by the show
    }
  }

  // Runs a sequence of formations: rise into the first, then hold / morph / hold
  // through each, then scatter and fly away. A formation flagged `wave` ripples
  // in the breeze (more toward its free end) while held and while fading.
  class DroneShow {
    constructor(forms) {
      const N = Math.min(...forms.map(f => f.targets.length));
      this.forms = forms.map(f => ({ targets: f.targets.slice(0, N), hold: f.hold, wave: !!f.wave }));
      this.drones = [];
      for (let i = 0; i < N; i++) {
        const d = new Drone();
        d.seq = this.forms.map(f => f.targets[i]);
        this.drones.push(d);
      }
      const A = 2600, M = 2000, F = 3000;
      this.A = A; this.M = M; this.F = F;
      const segs = [{ type: 'assemble', form: 0, t0: 0, t1: A }];
      let t = A;
      for (let k = 0; k < this.forms.length; k++) {
        const h = this.forms[k].hold, wave = this.forms[k].wave;
        segs.push({ type: 'hold', form: k, wave, t0: t, t1: t + h }); t += h;
        if (k < this.forms.length - 1) { segs.push({ type: 'morph', from: k, to: k + 1, t0: t, t1: t + M }); t += M; }
      }
      this.fadeStart = t;
      const lastWave = this.forms[this.forms.length - 1].wave;
      segs.push({ type: 'fade', form: this.forms.length - 1, wave: lastWave, t0: t, t1: t + F }); t += F;
      this.segs = segs; this.total = t;
      this.start = performance.now(); this.done = false; this.alpha = 0; this.e = 0;
      Audio.drones(A, this.fadeStart - A, F, N);          // sustain across every hold + morph
    }
    update(now) {
      const e = now - this.start; this.e = e;
      if (e >= this.total) { this.done = true; return; }
      this.alpha = e < 600 ? e / 600 : e < this.fadeStart ? 1 : 1 - (e - this.fadeStart) / this.F;
    }
    draw(g, now) {
      const e = this.e;
      const eio = p => p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
      let seg = this.segs[this.segs.length - 1];
      for (const s of this.segs) { if (e < s.t1) { seg = s; break; } }
      for (const d of this.drones) {
        let x, y, color, jitter = true, wf = null;
        if (seg.type === 'assemble') {
          const a = d.seq[0];
          const p = Math.max(0, Math.min(1, (e / 1000 - d.delay) / (this.A / 1000)));
          const ease = 1 - Math.pow(1 - p, 3);
          x = d.sx + (a.tx - d.sx) * ease; y = d.sy + (a.ty - d.sy) * ease;
          color = a.color; jitter = false;
        } else if (seg.type === 'hold') {
          const a = d.seq[seg.form]; x = a.tx; y = a.ty; color = a.color; if (seg.wave) wf = a;
        } else if (seg.type === 'morph') {
          const a = d.seq[seg.from], b = d.seq[seg.to], p = (e - seg.t0) / this.M, ep = eio(p);
          x = a.tx + (b.tx - a.tx) * ep; y = a.ty + (b.ty - a.ty) * ep;
          color = p < 0.5 ? a.color : b.color;
        } else {                                         // fade — scatter & fly away
          const a = d.seq[seg.form], fe = (e - seg.t0) / 1000;
          x = a.tx + d.dvx * fe * 34; y = a.ty + d.dvy * fe * 34; color = a.color;
          if (seg.wave) wf = a;
        }
        if (wf) {                                        // gentle flag ripple in the breeze
          const u = wf.u || 0, tt = now * 0.004, amp = 6 * u;
          y += Math.sin(tt * 1.15 + u * 6) * amp;
          x += Math.cos(tt * 0.95 + u * 6) * amp * 0.3;
        }
        if (jitter) { x += Math.sin(now * 0.002 + d.jx) * 2.2; y += Math.cos(now * 0.0023 + d.jy) * 2.2; }
        let br = 0.55 + 0.45 * Math.sin(now * 0.004 * d.twSpeed + d.tw);
        if (Math.random() < 0.015) br = 1.4;             // sparkle
        const sz = 10 * (0.7 + 0.45 * br);
        g.globalAlpha = Math.min(1, this.alpha * Math.max(0, br));
        g.drawImage(GLOW[color], x - sz / 2, y - sz / 2, sz, sz);
      }
      g.globalAlpha = 1;
    }
  }

  // ================= LOOP =================
  let nextIn = 0, last = performance.now();
  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05); last = now;
    const wc = write.x, wcv = write.c;

    // 1. Carry the accumulated smoke forward: copy read -> write, shifted
    //    sideways by the wind and dimmed by the persistence. This is what
    //    makes the trail layer itself drift across the sky as it fades.
    wc.setTransform(1, 0, 0, 1, 0, 0);
    wc.globalCompositeOperation = 'source-over';
    wc.clearRect(0, 0, wcv.width, wcv.height);
    wc.globalAlpha = 1 - cfg.fade;
    // Wind shear as one smooth affine transform: the horizontal shift grows
    // linearly with height (x' = x + topShift - slope*y), so high smoke outruns
    // low smoke and the launch trail continuously — no bands, no seams.
    const bh = wcv.height;
    const base = cfg.wind * 1.4 * DPR;
    const topShift = base * 1.8;        // drift at the very top of the sky
    const slope = base * 1.6 / bh;      // extra shift per pixel of height
    wc.setTransform(1, 0, -slope, 1, topShift, 0);
    wc.drawImage(read.c, 0, 0);
    wc.setTransform(1, 0, 0, 1, 0, 0);
    wc.globalAlpha = 1;

    // 2. Deposit this frame's light into the smoke buffer (CSS coords, additive).
    wc.setTransform(DPR, 0, 0, DPR, 0, 0);
    wc.globalCompositeOperation = 'lighter';

    if (cfg.auto && cfg.rate > 0 && !finale && started) {
      nextIn -= dt;
      while (nextIn <= 0) {
        // salvo: usually 1, sometimes a small burst of 2–3
        const r = Math.random();
        const n = cfg.salvo ? (r < 0.35 ? 1 : r < 0.72 ? 2 : 3) : 1;
        for (let k = 0; k < n; k++) rockets.push(new Rocket());
        // next launch lands in a window around the chosen rate (0.4×–1.6× the interval)
        nextIn += (1 / cfg.rate) * (0.4 + Math.random() * 1.2);
      }
    }

    // Grand finale: an escalating barrage, one big culminating volley, then silence.
    if (finale) {
      const fe = now - finale.start;
      if (fe < finale.dur) {
        if (fe >= finale.nextAt) {
          const prog = fe / finale.dur;                          // 0 → 1
          const n = 1 + Math.floor(prog * 4) + (Math.random() < 0.5 ? 1 : 0);
          for (let k = 0; k < n; k++) rockets.push(new Rocket());
          finale.nextAt = fe + (320 - prog * 240);               // cadence tightens toward the peak
        }
      } else if (!finale.volley) {
        finale.volley = true;                                    // the big culminating volley
        for (let k = 0; k < 22; k++) rockets.push(new Rocket());
      } else if (fe >= finale.dur + finale.tail) {               // ...then silence
        cfg.size = finale.saved.size; cfg.shape = finale.saved.shape; cfg.auto = false;
        autoBtn.classList.remove('active'); autoBtn.textContent = '▶ Auto-launch: OFF';
        finaleBtn.classList.remove('active'); finaleBtn.textContent = '🎆 Grand finale';
        finale = null;
      }
    }
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i]; r.update();
      if (!r.dead) r.draw(wc); else rockets.splice(i, 1);
    }
    for (let i = delayedBursts.length - 1; i >= 0; i--) {
      if (now >= delayedBursts[i].t) { triggerMini(delayedBursts[i]); delayedBursts.splice(i, 1); }
    }
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i]; s.update();
      if (s.life > 0 && s.y < H + 40) s.draw(wc); else sparks.splice(i, 1);
    }
    for (let i = twinkles.length - 1; i >= 0; i--) {
      const t = twinkles[i]; t.update();
      if (t.life > 0) t.draw(wc); else twinkles.splice(i, 1);
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i]; s.update();
      if (s.life > 0) s.draw(wc); else shockwaves.splice(i, 1);
    }
    wc.globalCompositeOperation = 'source-over';

    // 3. Present: dark sky + the drifting smoke buffer.
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#05060f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(wcv, 0, 0);

    // 3b. Drone show — crisp twinkling lights on the display, not part of the smoke.
    if (droneShow) {
      droneShow.update(now);
      if (droneShow.done) {
        droneShow = null;
        droneBtn.classList.remove('active');
        droneBtn.textContent = '🛸 Summon drone show';
      } else {
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.globalCompositeOperation = 'lighter';
        droneShow.draw(ctx, now);
        ctx.globalCompositeOperation = 'source-over';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }
    }

    // 4. Screen flash (flash bangs) — overlaid on the display, never part of the smoke.
    if (screenFlash > 0.01) {
      ctx.globalAlpha = Math.min(screenFlash, 1);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
      screenFlash *= 0.80;
    } else screenFlash = 0;

    // 5. Swap buffers for next frame.
    const tmp = read; read = write; write = tmp;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ================= INTERACTION =================
  let hintShown = true;
  function launchAt(x, y) {
    Audio.resume();
    rockets.push(new Rocket(x, y));
    if (hintShown) { document.getElementById('hint').style.opacity = '0'; hintShown = false; }
  }
  canvas.addEventListener('pointerdown', (e) => launchAt(e.clientX, e.clientY));
  window.addEventListener('pointerdown', () => { Audio.resume(); autoStartMusic(); }, { once: false });

  // ================= UI =================
  const bind = (id, valId, fmt, key, mul = 1) => {
    const el = document.getElementById(id), out = document.getElementById(valId);
    const apply = () => { const v = parseFloat(el.value); cfg[key] = v * mul; out.textContent = fmt(v); };
    el.addEventListener('input', apply); apply();
  };
  bind('rate', 'rateVal', v => v.toFixed(1) + '/s', 'rate');
  bind('size', 'sizeVal', v => String(Math.round(v)), 'size');

  const salvoEl = document.getElementById('salvo');
  salvoEl.addEventListener('change', () => { cfg.salvo = salvoEl.checked; });

  // shape chips
  const shapeWrap = document.getElementById('shapes');
  [...SHAPES, 'random'].forEach((s, i) => {
    const c = document.createElement('div');
    c.className = 'chip' + (s === cfg.shape ? ' sel' : '');
    c.textContent = s[0].toUpperCase() + s.slice(1);
    c.addEventListener('click', () => {
      cfg.shape = s;
      shapeWrap.querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
      c.classList.add('sel');
    });
    shapeWrap.appendChild(c);
  });

  // color swatches
  const swWrap = document.getElementById('swatches');
  PALETTE.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'swatch' + (i === 0 ? ' sel' : '');
    d.style.background = p.color === 'rainbow'
      ? 'conic-gradient(red, orange, yellow, lime, cyan, blue, magenta, red)' : p.color;
    d.title = p.name;
    d.addEventListener('click', () => {
      cfg.colorMode = p.color === 'rainbow' ? 'rainbow' : p.color;
      swWrap.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
      d.classList.add('sel');
    });
    swWrap.appendChild(d);
  });

  // volume

  // toggles
  const autoBtn = document.getElementById('autoBtn');
  autoBtn.addEventListener('click', () => {
    cfg.auto = !cfg.auto;
    autoBtn.classList.toggle('active', cfg.auto);
    autoBtn.textContent = cfg.auto ? '⏸ Auto-launch: ON' : '▶ Auto-launch: OFF';
  });

  const fsBtn = document.getElementById('fsBtn');
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) (document.documentElement.requestFullscreen || (() => {})).call(document.documentElement);
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    fsBtn.classList.toggle('active', on);
    fsBtn.textContent = on ? '⛶ Exit fullscreen' : '⛶ Fullscreen';
  });

  const finaleBtn = document.getElementById('finaleBtn');
  function startFinale() {
    Audio.resume();
    if (finale) return;                          // one finale at a time
    finale = { start: performance.now(), dur: 5000, tail: 1800, nextAt: 0, volley: false,
      saved: { size: cfg.size, shape: cfg.shape } };
    cfg.size = 170; cfg.shape = 'random';        // big, varied bursts for the barrage
    finaleBtn.classList.add('active'); finaleBtn.textContent = '🎆 Finale!';
  }
  finaleBtn.addEventListener('click', startFinale);

  const droneBtn = document.getElementById('droneBtn');
  droneBtn.addEventListener('click', () => {
    Audio.resume();
    if (droneShow) return;                       // one show at a time
    if (!LOGO) LOGO = buildLogoPoints();         // sample the formations once, then cache
    if (!BEAR) BEAR = buildBearPoints();
    if (!FLAG) FLAG = buildFlagPoints();
    droneShow = new DroneShow([
      { targets: mapTargets(LOGO), hold: 3000 },
      { targets: mapTargets(BEAR), hold: 3400 },
      { targets: mapTargets(FLAG), hold: 4400, wave: true },
    ]);
    droneBtn.classList.add('active');
    droneBtn.textContent = '🛸 Drones aloft…';
  });

  // panel collapse (mobile)
  // Music volume slider (controls the YouTube track)
  const musicEl = document.getElementById('music'), musicValEl = document.getElementById('musicVal');
  const applyMusic = () => { const v = parseInt(musicEl.value, 10); setMusicVol(v); musicValEl.textContent = v + '%'; };
  musicEl.addEventListener('input', applyMusic); applyMusic();

  const musicBtn = document.getElementById('musicBtn');
  updateMusicBtn = () => {
    musicBtn.classList.toggle('active', musicWant);
    musicBtn.textContent = musicWant ? '♪ Pause music' : '♪ Play music';
  };
  musicBtn.addEventListener('click', toggleMusic);
  updateMusicBtn();

  // Reduced-flash safety toggle — modal and menu checkboxes stay in sync.
  const introEl = document.getElementById('intro');
  const startBtn = document.getElementById('startBtn');
  const safeIntro = document.getElementById('safeFlashIntro');
  const safeMenu = document.getElementById('safeFlash');
  const setSafe = (v) => { cfg.safeFlash = v; safeIntro.checked = v; safeMenu.checked = v; };
  safeMenu.addEventListener('change', () => setSafe(safeMenu.checked));
  safeIntro.addEventListener('change', () => setSafe(safeIntro.checked));
  startBtn.addEventListener('click', () => {
    setSafe(safeIntro.checked);
    introEl.classList.add('hidden');
    started = true;
    Audio.resume(); autoStartMusic();
  });

  // Slide the menu open/closed. The ‹ button collapses it; the ☰ button reopens it.
  const panel = document.getElementById('panel'), toggleBtn = document.getElementById('toggleBtn');
  const collapseBtn = document.getElementById('collapseBtn');
  function setPanel(open) {
    panel.classList.toggle('hidden', !open);
    toggleBtn.style.display = open ? 'none' : 'flex';
  }
  collapseBtn.addEventListener('click', () => setPanel(false));
  toggleBtn.addEventListener('click', () => setPanel(true));

  // keyboard: space = burst, h = hide, f = fullscreen
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && started) { e.preventDefault(); launchAt(rand(W * 0.25, W * 0.75), rand(H * 0.15, H * 0.4)); }
    if (e.key === 'h') setPanel(panel.classList.contains('hidden'));
    if (e.key === 'f') fsBtn.click();
  });
})();
</script>
</body>
</html>
